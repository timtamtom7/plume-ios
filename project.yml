name: Plume
options:
  bundleIdPrefix: com.plume
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift
    from: "0.15.0"

targets:
  Plume:
    type: application
    platform: iOS
    sources:
      - path: Plume/Sources
      - path: Plume/Resources
    settings:
      base:
        INFOPLIST_FILE: Plume/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.plume.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: true
    dependencies:
      - package: SQLite
      - target: PlumeWidgetExtension
    info:
      path: Plume/Resources/Info.plist
      properties:
        CFBundleDisplayName: Plume
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "Plume needs camera access to photograph book covers and last-read pages."
        NSPhotoLibraryUsageDescription: "Plume needs photo library access to save book cover photos."
        UIUserInterfaceStyle: Light
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}

  PlumeWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: PlumeWidget
    settings:
      base:
        INFOPLIST_FILE: PlumeWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.plume.app.widget
        CODE_SIGN_STYLE: Automatic
        SKIP_INSTALL: true
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
    info:
      path: PlumeWidget/Info.plist
      properties:
        CFBundleDisplayName: Plume Widget
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
